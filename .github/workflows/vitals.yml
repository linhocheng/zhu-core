name: Vitals + Lint
# BUILDING_PROTOCOL v0.2 強制機制第一道：CI lint
# 三項檢查（隨 T3.1 補齊）：
#   [x] lint (eslint)
#   [x] manifest.ts schema valid (T3.1 check-manifest.mjs，找不到 manifest 暫不擋；T3.5 改強制)
#   [ ] entry handler 用 withVitals() wrapper (T3.4 各 worker pilot 後加 lint rule)
#   [ ] LLM call 走 bridgeCall / anthropicSdkCall wrapper (T3.4 後加 lint rule)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Manifest validate
        run: node zhu-vitals/scripts/check-manifest.mjs
